name: Daily Auto Commit

on:
  schedule:
    - cron: '5 2 * * *'   # Runs daily at 2:05 AM UTC
  workflow_dispatch:      # Allows manual trigger for testing
permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 22f1001700@ds.study.iitm.ac.in - Update file
        run: |
          echo "Last updated on $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config --global user.name "DevSync Bot"
          git config --global user.email "22f1001700@ds.study.iitm.ac.in"
          echo "Last updated at $(date)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Daily automated commit"
          git push
